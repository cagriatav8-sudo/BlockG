<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BlockG Studios - Panel</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #intro { position: absolute; z-index: 100; animation: fadeOutIntro 3s forwards; }
        .logo-g { color: #8a2be2; font-size: 150px; font-weight: bold; text-shadow: 0 0 20px #8a2be2; }
        @keyframes fadeOutIntro { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        #main-ui { display: none; width: 420px; text-align: center; animation: fadeIn 1s forwards; background: rgba(20, 20, 20, 0.9); padding: 30px; border-radius: 20px; border: 1px solid #8a2be2; box-shadow: 0 0 20px rgba(138, 43, 226, 0.3); }
        
        input, textarea { width: 85%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; border-radius: 8px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #8a2be2; box-shadow: 0 0 10px #8a2be2; }
        
        button { background: #8a2be2; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .tab { display: none; }
        .active { display: block; }
        nav { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; }
        nav button { background: #222; color: #aaa; padding: 8px 12px; font-size: 12px; }
        nav button:hover { color: #fff; background: #8a2be2; }
        #profile { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="logo-g" id="logo">G</div>
        <script>
            setTimeout(() => document.getElementById('logo').innerText = "BlockG", 1500);
        </script>
    </div>

    <div id="main-ui">
        <div id="profile">
            <div id="user-info">Giriş Yapılmadı</div>
        </div>

        <nav>
            <button onclick="showTab('home')">Giriş</button>
            <button onclick="showTab('vip')">VIP</button>
            <button onclick="showTab('ban')">Banlar</button>
            <button onclick="showTab('report')">Şikayet</button>
        </nav>

        <!-- Giriş Sekmesi -->
        <div id="home" class="tab active">
            <input type="text" id="loginUser" placeholder="Kullanıcı Adı">
            <button onclick="login()">Giriş Yap</button>
        </div>

        <!-- VIP Başvuru Sekmesi -->
        <div id="vip" class="tab">
            <input type="text" id="vipUser" placeholder="Kullanıcı Adı">
            <input type="password" id="vipPass" placeholder="Şifre (VIP/Admin Kodu)">
            <button onclick="applyVip()">Başvuruyu Gönder</button>
        </div>

        <!-- Banlananlar Sekmesi -->
        <div id="ban" class="tab">
            <h2>Banlanan Oyuncular</h2>
            <p>Şu an banlı kimse yok.</p>
        </div>

        <!-- Şikayet Sekmesi -->
        <div id="report" class="tab">
            <h2>Şikayet Et</h2>
            <textarea id="reportText" rows="3" placeholder="Detaylar..."></textarea>
            <button onclick="sendReport()">Gönder</button>
        </div>
    </div>

    <script>
        setTimeout(() => document.getElementById('main-ui').style.display = 'block', 3000);

        function login() {
            const user = document.getElementById('loginUser').value;
            if(user) {
                localStorage.setItem('blockg_user', user);
                updateProfile(user);
            }
        }

        function applyVip() {
            const user = document.getElementById('vipUser').value;
            const pass = document.getElementById('vipPass').value;
            let rank = "";
            if (pass === "gl54") rank = "Admin";
            else if (pass === "glB1") rank = "VIP+";
            else if (pass === "fgr4") rank = "VIP";
            else if (pass === "ed4r") rank = "Kıdemli Üye";

            if (rank !== "") {
                const body = `Sayın BlockG studios,%0A%0AŞifre: true;%0AAlınan Rütbe: ${rank};%0AKullanıcı Adı: ${user}%0A%0AKontrol en az 15dk da en uzun 3 günde olacaktır.%0ADaha hızlı olması amacıyla bize Whatsapp.in den yazabilirsiniz.`;
                window.location.href = `mailto:cagriatav1@gmail.com?subject=VIP Başvuru - ${user}&body=${body}`;
            } else {
                alert("Hatalı Şifre!");
            }
        }

        function updateProfile(user) {
            document.getElementById('user-info').innerHTML = 
                `<img src="https://minotar.net/avatar/${user}/60" style="border-radius:10px; border: 2px solid #8a2be2;"> <br> ${user}`;
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('blockg_user');
            if(savedUser) updateProfile(savedUser);
        };

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function sendReport() {
            const text = document.getElementById('reportText').value;
            window.location.href = `mailto:cagriatav1@gmail.com?subject=Sikayet&body=${text}`;
        }
    </script>
</body>
</html>
