<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BlockG Studios - Panel</title>
    <style>
        /* Animasyon Stilleri */
        #intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; justify-content: center; align-items: center; z-index: 9999; animation: fadeOutIntro 3s forwards; }
        .logo-g { color: #8a2be2; font-size: 150px; font-weight: bold; text-shadow: 0 0 20px #8a2be2; }
        @keyframes fadeOutIntro { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #main-ui { width: 900px; text-align: center; background: #0a0a0a; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-top: 50px; }
        input, textarea { width: 80%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; border-radius: 8px; color: white; }
        button { background: #8a2be2; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .shop-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .shop-item { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .tab { display: none; }
        .active { display: block; }
        nav { margin-bottom: 20px; }
        nav button { background: #222; color: #aaa; border: none; padding: 10px 15px; cursor: pointer; }
        nav button:hover { color: #fff; background: #8a2be2; }
        .header-image { max-width: 100%; border-radius: 15px; margin-bottom: 20px; pointer-events: none; }
    </style>
</head>
<body>

    <!-- Açılış Animasyonu -->
    <div id="intro">
        <div class="logo-g" id="logo">G</div>
        <script>
            setTimeout(() => document.getElementById('logo').innerText = "BlockG", 1500);
        </script>
    </div>

    <div id="main-ui">
        <img src="https://i.imgur.com/gK49GzT.png" alt="[Mağaza Görseli]" class="header-image">

        <nav>
            <button onclick="showTab('home')">Giriş</button>
            <button onclick="showTab('vip')">VIP</button>
            <button onclick="showTab('ban')">Banlar</button>
            <button onclick="showTab('report')">Şikayet</button>
            <button onclick="showTab('shop')">Mağaza</button>
        </nav>

        <div id="home" class="tab active">
            <input type="text" id="loginUser" placeholder="Kullanıcı Adı">
            <button onclick="login()">Giriş Yap</button>
        </div>

        <div id="vip" class="tab">
            <input type="text" id="vipUser" placeholder="Kullanıcı Adı">
            <input type="password" id="vipPass" placeholder="Şifre">
            <button onclick="applyVip()">Başvuruyu Gönder</button>
        </div>

        <div id="ban" class="tab"><h2>Banlanan Oyuncular</h2><p>Şu an banlı kimse yok.</p></div>

        <div id="report" class="tab">
            <h2>Şikayet</h2>
            <textarea id="reportText" rows="3"></textarea>
            <button onclick="sendReport()">Gönder</button>
        </div>

        <div id="shop" class="tab">
            <h2>EN İYİ TEKLİFLER</h2>
            <div class="shop-grid">
                <div class="shop-item"><h3>Set #1</h3><p>189P</p><button>Satın Al</button></div>
                <div class="shop-item"><h3>Set #2</h3><p>220P</p><button>Satın Al</button></div>
                <div class="shop-item"><h3>Set #3</h3><p>279P</p><button>Satın Al</button></div>
                <div class="shop-item"><h3>Set #4</h3><p>990P</p><button>Satın Al</button></div>
            </div>
            <hr style="border:0; border-top:1px solid #333; margin: 30px 0;">
            <h3>SON SATIN ALIMLAR</h3>
            <div style="display:flex; justify-content:center; gap:20px;">
                <div><img src="https://minotar.net/avatar/@mirac@/50" alt="Avatar"><div>@mirac@</div></div>
                <div><img src="https://minotar.net/avatar/orhanakman17/50" alt="Avatar"><div>orhanakman17</div></div>
            </div>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function login() { 
            try {
                localStorage.setItem('blockg_user', document.getElementById('loginUser').value); 
                alert("Giriş yapıldı!"); 
            } catch(e) { console.log("Depolama kapalı."); }
        }
        function applyVip() { alert("Başvuru maili hazırlanıyor..."); }
        function sendReport() { alert("Şikayetiniz gönderildi!"); }
    </script>
</body>
</html>
