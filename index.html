<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BlockG Studios - Panel</title>
    <style>
        #intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; justify-content: center; align-items: center; z-index: 9999; animation: fadeOutIntro 3s forwards; }
        .logo-g { color: #8a2be2; font-size: 150px; font-weight: bold; text-shadow: 0 0 20px #8a2be2; }
        @keyframes fadeOutIntro { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #main-ui { width: 900px; text-align: center; background: #0a0a0a; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-top: 50px; }
        input, textarea { width: 80%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; border-radius: 8px; color: white; }
        button { background: #8a2be2; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .tab { display: none; }
        .active { display: block; }
        nav { margin-bottom: 20px; }
        nav button { background: #222; color: #aaa; border: none; padding: 10px 15px; cursor: pointer; }
        nav button:hover { color: #fff; background: #8a2be2; }
        #profile-area { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #333; }
        .skin-avatar { border-radius: 10px; border: 2px solid #8a2be2; width: 80px; height: 80px; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="logo-g" id="logo">G</div>
        <script>setTimeout(() => document.getElementById('logo').innerText = "BlockG", 1500);</script>
    </div>

    <div id="main-ui">
        <div id="profile-area">
            <div id="user-display">Giriş Yapılmadı</div>
        </div>

        <nav>
            <button onclick="showTab('home')">Giriş</button>
            <button onclick="showTab('ip')">IP Adresi</button>
            <button onclick="showTab('vip')">VIP</button>
            <button onclick="showTab('ban')">Banlar</button>
            <button onclick="showTab('report')">Şikayet</button>
        </nav>

        <div id="home" class="tab active">
            <input type="text" id="loginUser" placeholder="Minecraft Kullanıcı Adı">
            <button onclick="login()">Giriş Yap</button>
        </div>

        <div id="ip" class="tab">
            <h2>Sunucu IP Adresi</h2>
            <div style="background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #8a2be2;">
                <code id="ip-text" style="font-size: 20px;">blockg.aternos.me</code>
            </div>
            <button onclick="copyIp()">IP'yi Kopyala</button>
        </div>

        <div id="vip" class="tab">
            <input type="text" id="vipUser" placeholder="Kullanıcı Adı">
            <input type="password" id="vipPass" placeholder="Şifre">
            <button onclick="applyVip()">Başvuruyu Gönder</button>
        </div>

        <div id="ban" class="tab"><h2>Banlanan Oyuncular</h2><p>Şu an banlı kimse yok.</p></div>

        <div id="report" class="tab">
            <h2>Şikayet</h2>
            <textarea id="reportText" rows="3"></textarea>
            <button onclick="sendReport()">Gönder</button>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function login() { 
            const user = document.getElementById('loginUser').value;
            localStorage.setItem('blockg_user', user);
            renderProfile(user);
        }

        function renderProfile(user) {
            document.getElementById('user-display').innerHTML = 
                `<img src="https://minotar.net/avatar/${user}/80" class="skin-avatar"><br>Hoş geldin, <b>${user}</b>`;
        }

        function copyIp() {
            navigator.clipboard.writeText("blockg.aternos.me");
            alert("IP Adresi kopyalandı!");
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('blockg_user');
            if(savedUser) renderProfile(savedUser);
        };

        function applyVip() { alert("Başvuru maili hazırlanıyor..."); }
        function sendReport() { alert("Şikayetiniz gönderildi!"); }
    </script>
</body>
</html>
