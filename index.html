<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BlockG Studios - Panel</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .tab { display: none; padding: 20px; }
        .active { display: block; }
        input, textarea { background: #1a1a1a; border: 2px solid #8a2be2; color: white; padding: 10px; margin: 5px; border-radius: 5px; width: 80%; }
        button { background: #8a2be2; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        #profile { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div id="profile">
        <div id="user-info">Giriş Yapılmadı</div>
    </div>

    <nav>
        <button onclick="showTab('home')">Giriş/Başvuru</button>
        <button onclick="showTab('ban')">Banlananlar</button>
        <button onclick="showTab('report')">Şikayet</button>
    </nav>

    <div id="home" class="tab active">
        <input type="text" id="username" placeholder="Minecraft Adı">
        <input type="password" id="pass" placeholder="Şifre (VIP/Admin)">
        <button onclick="login()">Giriş Yap</button>
    </div>

    <div id="ban" class="tab">
        <h2>Banlanan Oyuncular</h2>
        <p>Şu an banlı kimse yok.</p>
    </div>

    <div id="report" class="tab">
        <h2>Şikayet Et</h2>
        <textarea id="reportText" placeholder="Kimi ve neden şikayet ediyorsun?"></textarea><br>
        <button onclick="sendReport()">Şikayeti Gönder</button>
    </div>

    <script>
        // Giriş Yapma
        function login() {
            const user = document.getElementById('username').value;
            localStorage.setItem('blockg_user', user);
            // Minecraft kafa API'si
            document.getElementById('user-info').innerHTML = 
                `<img src="https://minotar.net/avatar/${user}/50" style="border-radius:5px;"> <br> Hoş geldin, ${user}`;
        }

        // Sayfa yüklendiğinde eski girişi kontrol et
        window.onload = () => {
            const savedUser = localStorage.getItem('blockg_user');
            if(savedUser) {
                document.getElementById('user-info').innerHTML = 
                    `<img src="https://minotar.net/avatar/${savedUser}/50" style="border-radius:5px;"> <br> Hoş geldin, ${savedUser}`;
            }
        };

        // Sekme Değiştirme
        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Şikayet Gönder
        function sendReport() {
            const text = document.getElementById('reportText').value;
            window.location.href = `mailto:cagriatav1@gmail.com?subject=Sikayet&body=${text}`;
        }
    </script>
</body>
</html>
