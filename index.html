<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BlockG Studios - Panel</title>
    <style>
        /* Partikül arka plan için genel ayarlar */
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* G ve BlockG Animasyonu */
        #intro { position: absolute; z-index: 100; animation: fadeOutIntro 3s forwards; }
        .logo-g { color: #8a2be2; font-size: 150px; font-weight: bold; text-shadow: 0 0 20px #8a2be2; }
        @keyframes fadeOutIntro { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* Ana Panel */
        #main-ui { display: none; width: 400px; text-align: center; animation: fadeIn 1s forwards; background: rgba(20, 20, 20, 0.9); padding: 30px; border-radius: 20px; border: 1px solid #8a2be2; box-shadow: 0 0 20px rgba(138, 43, 226, 0.3); }
        
        /* Şık Kutucuklar */
        input, textarea { width: 85%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; border-radius: 8px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #8a2be2; box-shadow: 0 0 10px #8a2be2; }
        
        button { background: #8a2be2; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .tab { display: none; }
        .active { display: block; }
        nav button { background: none; color: #aaa; border: none; cursor: pointer; padding: 10px; font-size: 14px; }
        nav button:hover { color: #8a2be2; }
        #profile { margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- G Animasyonu -->
    <div id="intro">
        <div class="logo-g" id="logo">G</div>
        <script>
            setTimeout(() => document.getElementById('logo').innerText = "BlockG", 1500);
        </script>
    </div>

    <!-- Ana Panel -->
    <div id="main-ui">
        <div id="profile">
            <div id="user-info">Lütfen Giriş Yapın</div>
        </div>

        <nav>
            <button onclick="showTab('home')">Giriş</button>
            <button onclick="showTab('ban')">Banlananlar</button>
            <button onclick="showTab('report')">Şikayet</button>
        </nav>

        <div id="home" class="tab active">
            <input type="text" id="username" placeholder="Minecraft Kullanıcı Adı">
            <input type="password" id="pass" placeholder="Şifre">
            <button onclick="login()">Giriş Yap</button>
        </div>

        <div id="ban" class="tab">
            <h2>Banlananlar</h2>
            <p>Şu an banlı kimse yok.</p>
        </div>

        <div id="report" class="tab">
            <h2>Şikayet Et</h2>
            <textarea id="reportText" rows="4" placeholder="Şikayet detaylarını yazın..."></textarea>
            <button onclick="sendReport()">Gönder</button>
        </div>
    </div>

    <script>
        // Animasyon bittikten sonra paneli göster
        setTimeout(() => document.getElementById('main-ui').style.display = 'block', 3000);

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('pass').value;
            let rank = "";

            if (pass === "gl54") rank = "Admin";
            else if (pass === "glB1") rank = "VIP+";
            else if (pass === "fgr4") rank = "VIP";
            else if (pass === "ed4r") rank = "Kıdemli Üye";

            if (rank !== "") {
                localStorage.setItem('blockg_user', user);
                updateProfile(user);
                alert("Hoş geldin " + rank);
            } else {
                alert("Şifre Yanlış!");
            }
        }

        function updateProfile(user) {
            document.getElementById('user-info').innerHTML = 
                `<img src="https://minotar.net/avatar/${user}/60" style="border-radius:10px; border: 2px solid #8a2be2;"> <br> ${user}`;
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('blockg_user');
            if(savedUser) updateProfile(savedUser);
        };

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function sendReport() {
            const text = document.getElementById('reportText').value;
            window.location.href = `mailto:cagriatav1@gmail.com?subject=Sikayet&body=${text}`;
        }
    </script>
</body>
</html>
